<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デッキ管理ツール</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    #addCard {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: #ff4757;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .card {
      background: #2f3542;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .stats {
      margin-top: 20px;
      padding: 10px;
      background: #2f3542;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>🃏 デッキ管理ツール</h1>

<input type="text" id="addCard" placeholder="カード名を入力">
<button onclick="addCard()">追加</button>

<div id="deckList"></div>

<div class="stats">
  <p>攻撃：<span id="attackCount">0</span></p>
  <p>スキル：<span id="skillCount">0</span></p>
  <p>パワー：<span id="powerCount">0</span></p>
</div>

<script>
let deck = [];

async function addCard() {
  const name = document.getElementById('addCard').value.trim();
  if (!name) return;

  const response = await fetch('cards.json');
  const cards = await response.json();
  const card = cards.find(c => c.name.toLowerCase() === name.toLowerCase());

  if (!card) {
    alert("カードが見つかりません");
    return;
  }

  deck.push(card);
  document.getElementById('addCard').value = "";
  renderDeck();
}

function removeCard(index) {
  deck.splice(index, 1);
  renderDeck();
}

function renderDeck() {
  const list = document.getElementById('deckList');
  list.innerHTML = "";

  let attack = 0, skill = 0, power = 0;

  deck.forEach((card, i) => {
    if (card.type === "Attack") attack++;
    if (card.type === "Skill") skill++;
    if (card.type === "Power") power++;

    const div = document.createElement('div');
    div.className = "card";
    div.innerHTML = `
      <strong>${card.name}</strong> (${card.type})
      <button onclick="removeCard(${i})">削除</button>
    `;
    list.appendChild(div);
  });

  document.getElementById('attackCount').textContent = attack;
  document.getElementById('skillCount').textContent = skill;
  document.getElementById('powerCount').textContent = power;
}
</script>

</body>
</html>
