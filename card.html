<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード図鑑</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    #search {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin-bottom: 20px;
    }
    .card {
      background: #2f3542;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .card strong {
      font-size: 18px;
    }

    /* ▼▼ キャラ専用色分け ▼▼ */
    .card.ironclad { background: #8b1e1e; }      /* 赤 */
    .card.silent { background: #1e8b3a; }        /* 緑 */
    .card.regent { background: #d97a1e; }        /* オレンジ */
    .card.necrobinder { background: #6a1e8b; }   /* 紫 */
    .card.defect { background: #1ea7d9; }        /* 水色 */
    .card.colorless { background: #555555; }     /* 灰色 */
    /* ▲▲ キャラ専用色分け ▲▲ */

  </style>
</head>
<body>

<h1>📘 カード図鑑</h1>

<input type="text" id="search" placeholder="カード名・タイプ・シナジーで検索">

<div id="cardList"></div>

<script>
async function loadCards() {
  const response = await fetch('cards.json?cache=' + Date.now());
  const cards = await response.json();
  const list = document.getElementById('cardList');
  const search = document.getElementById('search');

  function render(filter = "") {
    list.innerHTML = "";
    cards
      .filter(c => JSON.stringify(c).toLowerCase().includes(filter.toLowerCase()))
      .forEach(card => {
        const div = document.createElement('div');
        div.className = "card";

        /* ▼▼ キャラ専用タグ → 背景色クラス付与 ▼▼ */
        if (card.tags.includes("アイアンクラッド専用")) div.classList.add("ironclad");
        else if (card.tags.includes("サイレント専用")) div.classList.add("silent");
        else if (card.tags.includes("リージェント専用")) div.classList.add("regent");
        else if (card.tags.includes("ネクロバインダー専用")) div.classList.add("necrobinder");
        else if (card.tags.includes("ディフェクト専用")) div.classList.add("defect");
        else div.classList.add("colorless");
        /* ▲▲ キャラ専用タグ → 背景色クラス付与 ▲▲ */

        div.innerHTML = `
          <strong>${card.name}</strong><br>
          タイプ：${card.type}<br>
          コスト：${card.cost}<br>
          レア度：${card.rarity}<br>
          効果：${card.effect}<br>
          強化後：${card.upgradeEffect}<br>
          シナジー：${card.synergy.join(", ")}<br>
          ランク：${card.valuation}
        `;
        list.appendChild(div);
      });
  }

  search.addEventListener('input', () => render(search.value));
  render();
}

loadCards();
</script>

</body>
</html>
