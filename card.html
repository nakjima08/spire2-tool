<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード図鑑</title>

  <style>
    #lastUpdate {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #cccccc;
      font-size: 14px;
      background: rgba(0,0,0,0.4);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 10;
    }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #search, #sortSelect {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin-bottom: 15px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 14px;
      background: #333;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }

    .tab.active {
      background: #555;
      font-weight: bold;
      border: 2px solid #888;
    }

    #tagModeSwitch {
      margin-bottom: 8px;
      font-size: 14px;
    }

    .mode-btn {
      padding: 4px 10px;
      background: #333;
      color: #fff;
      border: 1px solid #666;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 6px;
    }

    .mode-btn.active {
      background: #1e90ff;
      border-color: #63b3ff;
    }

    .tag-filter-wrapper {
      margin-bottom: 10px;
      border-radius: 8px;
      background: #222;
      padding: 8px 10px;
    }

    .tag-filter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .tag-toggle-arrow {
      font-size: 14px;
      margin-left: 8px;
    }

    .tag-buttons {
      margin-top: 8px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-buttons.open {
      display: flex;
    }

    .tag-buttons button {
      padding: 4px 10px;
      background: #333;
      color: #fff;
      border: 1px solid #666;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .tag-buttons button.active {
      background: #1e90ff;
      border-color: #63b3ff;
    }

    .selected-tags {
      margin-top: 6px;
      font-size: 13px;
      color: #ccc;
    }

    .selected-tags span {
      display: inline-block;
      margin-right: 6px;
      padding: 2px 6px;
      border-radius: 6px;
      background: #444;
    }

    #cardList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 15px;
    }

    .card {
      background: #2f3542;
      padding: 15px;
      border-radius: 8px;
      border: 3px solid transparent;
      box-sizing: border-box;
      color: #ffffff;
      height: 100%;
    }

    .type-icon {
      font-size: 20px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .card.ironclad { background: #8b1e1e; }
    .card.silent { background: #1e8b3a; }
    .card.regent { background: #d97a1e; }
    .card.necrobinder { background: #6a1e8b; }
    .card.defect { background: #1ea7d9; }

    .card.colorless {
      background: #555555;
      border: 3px solid transparent !important;
    }

    .rarity-rare { color: #ffd700 !important; font-weight: bold; }
    .rarity-uncommon { color: #1ec8ff !important; font-weight: bold; }
    .rarity-common { color: #cccccc !important; }

    .toggle-box {
      cursor: pointer;
      padding: 5px 0;
      user-select: none;
    }

    .toggle-arrow {
      font-weight: bold;
      margin-right: 6px;
    }

    .toggle-content {
      max-height: 0;
      overflow: hidden;
      margin-top: 4px;
      padding-left: 10px;
      color: #ffd24d;
      font-size: 14px;
      opacity: 0;
      transition: max-height 0.25s ease-out, opacity 0.25s ease-out;
    }

    .toggle-content.open {
      max-height: 200px;
      opacity: 1;
    }

    .card.rare { border-color: #ffd700 !important; }
    .card.uncommon { border-color: #1ec8ff !important; }
    .card.common { border-color: #888888 !important; }
  </style>
</head>

<body>
<div id="lastUpdate"></div>

<h1>📘 カード図鑑</h1>

<div class="tabs">
  <div class="tab active" data-filter="all">全カード</div>
  <div class="tab" data-filter="アイアンクラッド専用">アイアンクラッド</div>
  <div class="tab" data-filter="サイレント専用">サイレント</div>
  <div class="tab" data-filter="リージェント専用">リージェント</div>
  <div class="tab" data-filter="ネクロバインダー専用">ネクロバインダー</div>
  <div class="tab" data-filter="ディフェクト専用">ディフェクト</div>
  <div class="tab" data-filter="common">共通</div>
</div>

<div id="tagModeSwitch">
  <button id="modeAnd" class="mode-btn active">AND</button>
  <button id="modeOr" class="mode-btn">OR</button>
  <button id="tagClear" class="mode-btn" style="background:#552222;">クリア</button>
</div>


<div class="tag-filter-wrapper">
  <div class="tag-filter-header" id="tagFilterHeader">
    <span>タグフィルタ</span>
    <span class="tag-toggle-arrow" id="tagToggleArrow">▼</span>
  </div>
  <div id="tagButtons" class="tag-buttons"></div>
  <div class="selected-tags" id="selectedTagsView"></div>
</div>

<input type="text" id="search" placeholder="カード名・タイプ・シナジーで検索">

<select id="sortSelect">
  <option value="rarity-asc">レア度（昇順）</option>
  <option value="rarity-desc">レア度（降順）</option>
  <option value="cost-asc">コスト（昇順）</option>
  <option value="cost-desc">コスト（降順）</option>
  <option value="ucost-asc">強化後コスト（昇順）</option>
  <option value="ucost-desc">強化後コスト（降順）</option>
  <option value="rank-asc">ランク（昇順）</option>
  <option value="rank-desc">ランク（降順）</option>
</select>

<div id="cardList"></div>

<script>
async function showLastUpdate() {
  async function getLastModified(url) {
    const res = await fetch(url, { method: 'HEAD' });
    const last = res.headers.get('Last-Modified');
    return last ? new Date(last) : null;
  }

  const htmlDate = await getLastModified('card.html');
  const jsonDate = await getLastModified('cards.json');

  const latest = (htmlDate && jsonDate)
    ? (htmlDate > jsonDate ? htmlDate : jsonDate)
    : (htmlDate || jsonDate);

  if (latest) {
    const y = latest.getFullYear();
    const m = String(latest.getMonth() + 1).padStart(2, "0");
    const d = String(latest.getDate()).padStart(2, "0");
    const h = String(latest.getHours()).padStart(2, "0");
    const min = String(latest.getMinutes()).padStart(2, "0");
    document.getElementById("lastUpdate").textContent =
      `最終更新：${y}/${m}/${d} ${h}:${min}`;
  }
}
showLastUpdate();

async function loadCards() {
  const response = await fetch('cards.json?cache=' + Date.now());
  let cards = await response.json();

  const list = document.getElementById('cardList');
  const search = document.getElementById('search');
  const sortSelect = document.getElementById('sortSelect');
  const tabs = document.querySelectorAll('.tab');

  const tagButtonsContainer = document.getElementById('tagButtons');
  const selectedTagsView = document.getElementById('selectedTagsView');
  const tagFilterHeader = document.getElementById('tagFilterHeader');
  const tagToggleArrow = document.getElementById('tagToggleArrow');

  let selectedTabFilters = [];
  let selectedTags = [];
  let tagMode = "AND";

  const rarityOrder = { "コモン": 1, "アンコモン": 2, "レア": 3 };
  const rankOrder = { "S": 1, "A": 2, "B": 3, "C": 4, "D": 5, "E": 6 };

  const tagSet = new Set();
  cards.forEach(card => {
    (card.tags || []).forEach(t => tagSet.add(t));
    if (card.rarity) tagSet.add(`レア度:${card.rarity}`);
    if (card.cost !== undefined) tagSet.add(`コスト:${card.cost}`);
    if (card.upgradecost !== undefined) tagSet.add(`強化後コスト:${card.upgradecost}`);
  });
  const allTags = Array.from(tagSet).sort((a, b) => a.localeCompare(b, 'ja'));

  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.textContent = tag;
    btn.dataset.tag = tag;
    tagButtonsContainer.appendChild(btn);
  });

  tagFilterHeader.addEventListener('click', () => {
    const isOpen = tagButtonsContainer.classList.contains('open');
    tagButtonsContainer.classList.toggle('open');
    tagToggleArrow.textContent = isOpen ? '▼' : '▲';
  });

  document.getElementById("modeAnd").addEventListener("click", () => {
    tagMode = "AND";
    document.getElementById("modeAnd").classList.add("active");
    document.getElementById("modeOr").classList.remove("active");
    render();
  });

  document.getElementById("modeOr").addEventListener("click", () => {
    tagMode = "OR";
    document.getElementById("modeOr").classList.add("active");
    document.getElementById("modeAnd").classList.remove("active");
    render();
  });
  
  /* ▼ タグ選択クリア ▼ */
document.getElementById("tagClear").addEventListener("click", () => {
  selectedTags = [];

  // ボタンの active を全部解除
  tagButtonsContainer.querySelectorAll("button").forEach(btn => {
    btn.classList.remove("active");
  });

  // 選択中タグ表示を消す
  selectedTagsView.textContent = "";

  render();
});

  tagButtonsContainer.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const tag = btn.dataset.tag;
      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
        btn.classList.remove('active');
      } else {
        selectedTags.push(tag);
        btn.classList.add('active');
      }
      updateSelectedTagsView();
      render();
    });
  });

  function updateSelectedTagsView() {
    if (selectedTags.length === 0) {
      selectedTagsView.textContent = '';
      return;
    }
    selectedTagsView.innerHTML =
      '選択中タグ：' + selectedTags.map(t => `<span>${t}</span>`).join('');
  }

  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      const filter = tab.dataset.filter;
      if (filter === "all") {
        selectedTabFilters = [];
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
      } else {
        const isActive = tab.classList.contains("active");
        if (isActive) {
          tab.classList.remove("active");
          selectedTabFilters = selectedTabFilters.filter(f => f !== filter);
        } else {
          tab.classList.add("active");
          selectedTabFilters.push(filter);
          const allTab = document.querySelector('.tab[data-filter="all"]');
          allTab.classList.remove("active");
        }
      }
      render();
    });
  });

 function sortCards(data) {
  return data.sort((a, b) => {
    // ① レア度
    const rarityOrder = { "レア": 1, "アンコモン": 2, "コモン": 3 };
    if (rarityOrder[a.rarity] !== rarityOrder[b.rarity]) {
      return rarityOrder[a.rarity] - rarityOrder[b.rarity];
    }

    // ② コスト
    if (a.cost !== b.cost) {
      return a.cost - b.cost;
    }

    // ③ 名前（日本語混ざってもOK）
    return a.name.localeCompare(b.name, "ja");
  });
}


  function render() {
    list.innerHTML = "";
    let filtered = cards;

    if (selectedTabFilters.length > 0) {
      filtered = filtered.filter(card => {
        if (selectedTabFilters.includes("common")) {
          const isCommon =
            !card.tags.includes("アイアンクラッド専用") &&
            !card.tags.includes("サイレント専用") &&
            !card.tags.includes("リージェント専用") &&
            !card.tags.includes("ネクロバインダー専用") &&
            !card.tags.includes("ディフェクト専用");
          if (isCommon) return true;
        }
        return selectedTabFilters.some(f => card.tags.includes(f));
      });
    }

    if (selectedTags.length > 0) {
      filtered = filtered.filter(card => {
        const cardTagList = [
          ...(card.tags || []),
          `レア度:${card.rarity}`,
          `コスト:${card.cost}`,
          `強化後コスト:${card.upgradecost}`
        ];
        if (tagMode === "AND") {
          return selectedTags.every(tag => cardTagList.includes(tag));
        } else {
          return selectedTags.some(tag => cardTagList.includes(tag));
        }
      });
    }

    const keyword = search.value.toLowerCase();
    if (keyword) {
      filtered = filtered.filter(c =>
        JSON.stringify(c).toLowerCase().includes(keyword)
      );
    }

    filtered = sortCards(filtered);

    filtered.forEach(card => {
      const div = document.createElement('div');
      div.className = "card";

      if (card.rarity === "レア") div.classList.add("rare");
      else if (card.rarity === "アンコモン") div.classList.add("uncommon");
      else div.classList.add("common");

      if (card.tags.includes("アイアンクラッド専用")) div.classList.add("ironclad");
      else if (card.tags.includes("サイレント専用")) div.classList.add("silent");
      else if (card.tags.includes("リージェント専用")) div.classList.add("regent");
      else if (card.tags.includes("ネクロバインダー専用")) div.classList.add("necrobinder");
      else if (card.tags.includes("ディフェクト専用")) div.classList.add("defect");
      else div.classList.add("colorless");

      let rarityClass = "rarity-common";
      if (card.rarity === "レア") rarityClass = "rarity-rare";
      else if (card.rarity === "アンコモン") rarityClass = "rarity-uncommon";

      let typeIcon = "❓";
      if (card.type === "アタック") typeIcon = "⚔";
      else if (card.type === "スキル") typeIcon = "📘";
      else if (card.type === "パワー") typeIcon = "💪";

      div.innerHTML = `
        <strong><span class="type-icon">${typeIcon}</span>${card.name}</strong><br>
        タイプ：${card.type}<br>
        レア度：<span class="${rarityClass}">${card.rarity}</span><br>

        <div class="toggle-box">
          <span class="toggle-arrow">▼</span>コスト：${card.cost}
          <div class="toggle-content">強化後コスト：${card.upgradecost}</div>
        </div>

        <div class="toggle-box">
          <span class="toggle-arrow">▼</span>効果：${card.effect}
          <div class="toggle-content">強化後：${card.upgradeEffect}</div>
        </div>

        シナジー：${(card.synergy || []).join(", ")}<br>
        ランク：${card.valuation}
      `;

      div.querySelectorAll(".toggle-box").forEach(box => {
        const arrow = box.querySelector(".toggle-arrow");
        const content = box.querySelector(".toggle-content");
        box.addEventListener("click", () => {
          const isOpen = content.classList.contains("open");
          content.classList.toggle("open");
          arrow.textContent = isOpen ? "▼" : "▲";
        });
      });

      list.appendChild(div);
    });
  }

  search.addEventListener('input', render);
  sortSelect.addEventListener('change', render);

  render();
}

loadCards();
</script>

</body>
</html>
