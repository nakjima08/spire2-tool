<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード図鑑</title>

  <style>
    /* ▼ 左上の最終更新日時 ▼ */
    #lastUpdate {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #cccccc;
      font-size: 14px;
      background: rgba(0,0,0,0.4);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 9999;
    }

    /* ▼ タイプアイコン ▼ */
    .type-icon {
      font-size: 20px;
      margin-right: 6px;
      vertical-align: middle;
    }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #search, #sortSelect {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin-bottom: 15px;
    }

    /* ▼ カード一覧をグリッド化 ▼ */
    #cardList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 15px;
    }

    /* ▼ カード基本デザイン ▼ */
    .card {
      background: #2f3542;
      padding: 15px;
      border-radius: 8px;
      border: 3px solid transparent;
      color: #ffffff;
      height: 100%;
      position: relative;
    }

    .card strong {
      font-size: 18px;
    }

    /* ▼ キャラ専用背景色 ▼ */
    .card.ironclad { background: #8b1e1e; }
    .card.silent { background: #1e8b3a; }
    .card.regent { background: #d97a1e; }
    .card.necrobinder { background: #6a1e8b; }
    .card.defect { background: #1ea7d9; }
    .card.colorless { background: #555555; }

    /* ▼ レア度枠線（コモンも灰色枠線） ▼ */
    .card.rare { border: 3px solid #ffd700 !important; }
    .card.uncommon { border: 3px solid #1ec8ff !important; }
    .card.common { border: 3px solid #888888 !important; }

    /* ▼ レア度文字色 ▼ */
    .rarity-rare { color: #ffd700 !important; font-weight: bold; }
    .rarity-uncommon { color: #1ec8ff !important; font-weight: bold; }
    .rarity-common { color: #cccccc !important; }

    /* ▼ 折りたたみ共通 ▼ */
    .toggle-box {
      cursor: pointer;
      padding: 5px 0;
      user-select: none;
    }

    .toggle-arrow {
      font-weight: bold;
      margin-right: 6px;
    }

    /* ▼ アニメーション付き折りたたみ ▼ */
    .toggle-content {
      max-height: 0;
      overflow: hidden;
      margin-top: 4px;
      padding-left: 10px;
      color: #ffd24d;
      font-size: 14px;
      opacity: 0;
      transition: max-height 0.25s ease-out, opacity 0.25s ease-out;
    }

    .toggle-content.open {
      max-height: 200px;
      opacity: 1;
    }
  </style>
</head>

<body>

<!-- ▼ 左上の更新日時 ▼ -->
<div id="lastUpdate"></div>

<h1>📘 カード図鑑</h1>

<input type="text" id="search" placeholder="カード名・タイプ・シナジーで検索">

<!-- ▼ ソート選択 ▼ -->
<select id="sortSelect">
  <option value="name-asc">あいうえお順（昇順）</option>
  <option value="name-desc">あいうえお順（降順）</option>
  <option value="rarity-asc">レア度（昇順）</option>
  <option value="rarity-desc">レア度（降順）</option>
  <option value="cost-asc">コスト（昇順）</option>
  <option value="cost-desc">コスト（降順）</option>
  <option value="ucost-asc">強化後コスト（昇順）</option>
  <option value="ucost-desc">強化後コスト（降順）</option>
  <option value="rank-asc">ランク（昇順）</option>
  <option value="rank-desc">ランク（降順）</option>
</select>

<div id="cardList"></div>

<script>
/* ▼ 最終更新日時表示 ▼ */
function showLastUpdate() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const h = String(now.getHours()).padStart(2, "0");
  const min = String(now.getMinutes()).padStart(2, "0");

  document.getElementById("lastUpdate").textContent =
    `最終更新：${y}/${m}/${d} ${h}:${min}`;
}
showLastUpdate();


/* ▼ カード読み込み ▼ */
async function loadCards() {
  const response = await fetch('cards.json?cache=' + Date.now());
  let cards = await response.json();
  const list = document.getElementById('cardList');
  const search = document.getElementById('search');
  const sortSelect = document.getElementById('sortSelect');

  /* ▼ レア度の並び順定義（昇順用） */
  const rarityOrder = { "コモン": 1, "アンコモン": 2, "レア": 3 };

  /* ▼ ランクの並び順（例：S > A > B > C > D > E） */
  const rankOrder = { "S": 1, "A": 2, "B": 3, "C": 4, "D": 5, "E": 6 };

  function sortCards(data) {
    const mode = sortSelect.value;

    return data.sort((a, b) => {
      switch (mode) {

        case "name-asc":
          return a.name.localeCompare(b.name, "ja");

        case "name-desc":
          return b.name.localeCompare(a.name, "ja");

        case "rarity-asc":
          return rarityOrder[a.rarity] - rarityOrder[b.rarity];

        case "rarity-desc":
          return rarityOrder[b.rarity] - rarityOrder[a.rarity];

        case "cost-asc":
          return a.cost - b.cost;

        case "cost-desc":
          return b.cost - a.cost;

        case "ucost-asc":
          return Number(a.upgradecost) - Number(b.upgradecost);

        case "ucost-desc":
          return Number(b.upgradecost) - Number(a.upgradecost);

        case "rank-asc":
          return rankOrder[a.valuation] - rankOrder[b.valuation];

        case "rank-desc":
          return rankOrder[b.valuation] - rankOrder[a.valuation];

        default:
          return 0;
      }
    });
  }

  function render(filter = "") {
    list.innerHTML = "";

    let filtered = cards.filter(c =>
      JSON.stringify(c).toLowerCase().includes(filter.toLowerCase())
    );

    let sorted = sortCards(filtered);

    sorted.forEach(card => {

      const div = document.createElement('div');
      div.className = "card";

      /* ▼ キャラ専用背景色 ▼ */
      if (card.tags.includes("アイアンクラッド専用")) div.classList.add("ironclad");
      else if (card.tags.includes("サイレント専用")) div.classList.add("silent");
      else if (card.tags.includes("リージェント専用")) div.classList.add("regent");
      else if (card.tags.includes("ネクロバインダー専用")) div.classList.add("necrobinder");
      else if (card.tags.includes("ディフェクト専用")) div.classList.add("defect");
      else div.classList.add("colorless");

      /* ▼ レア度枠線 ▼ */
      if (card.rarity === "レア") div.classList.add("rare");
      else if (card.rarity === "アンコモン") div.classList.add("uncommon");
      else div.classList.add("common");

      /* ▼ レア度文字色 ▼ */
      let rarityClass = "rarity-common";
      if (card.rarity === "レア") rarityClass = "rarity-rare";
      else if (card.rarity === "アンコモン") rarityClass = "rarity-uncommon";

      /* ▼ タイプアイコン ▼ */
      let typeIcon = "❓";
      if (card.type === "アタック") typeIcon = "⚔";
      else if (card.type === "スキル") typeIcon = "📘";
      else if (card.type === "パワー") typeIcon = "💪";

      /* ▼ HTML本体 ▼ */
      div.innerHTML = `
        <strong><span class="type-icon">${typeIcon}</span>${card.name}</strong><br>
        タイプ：${card.type}<br>
        レア度：<span class="${rarityClass}">${card.rarity}</span><br>

        <div class="toggle-box cost-box">
          <span class="toggle-arrow">▼</span>コスト：${card.cost}
          <div class="toggle-content">強化後：${card.upgradecost}</div>
        </div>

        <div class="toggle-box effect-box">
          <span class="toggle-arrow">▼</span>効果：${card.effect}
          <div class="toggle-content">強化後：${card.upgradeEffect}</div>
        </div>

        シナジー：${card.synergy.join(", ")}<br>
        ランク：${card.valuation}
      `;

      /* ▼ アニメーション付き折りたたみ ▼ */
      div.querySelectorAll(".toggle-box").forEach(box => {
        const arrow = box.querySelector(".toggle-arrow");
        const content = box.querySelector(".toggle-content");

        box.addEventListener("click", () => {
          const isOpen = content.classList.contains("open");

          if (isOpen) {
            content.classList.remove("open");
            arrow.textContent = "▼";
          } else {
            content.classList.add("open");
            arrow.textContent = "▲";
          }
        });
      });

      list.appendChild(div);
    });
  }

  search.addEventListener('input', () => render(search.value));
  sortSelect.addEventListener('change', () => render(search.value));

  render();
}

loadCards();
</script>

</body>
</html>
