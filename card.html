<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード図鑑</title>

  <style>
    /* ▼ 左上の最終更新日時 ▼ */
    #lastUpdate {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #cccccc;
      font-size: 14px;
      background: rgba(0,0,0,0.4);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 9999;
    }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #search, #sortSelect {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin-bottom: 15px;
    }

    /* ▼ タブUI ▼ */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 14px;
      background: #333;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
    }

    .tab.active {
      background: #555;
      font-weight: bold;
      border: 2px solid #888;
    }

    /* ▼ カード一覧をグリッド化 ▼ */
    #cardList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 15px;
    }

    /* ▼ カード基本デザイン（枠線復活のため border を初期設定） ▼ */
    .card {
      background: #2f3542;
      padding: 15px;
      border-radius: 8px;
      border: 3px solid transparent;
      box-sizing: border-box;
      color: #ffffff;
      height: 100%;
    }

    .type-icon {
      font-size: 20px;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* ▼ キャラ専用背景色 ▼ */
    .card.ironclad { background: #8b1e1e; }
    .card.silent { background: #1e8b3a; }
    .card.regent { background: #d97a1e; }
    .card.necrobinder { background: #6a1e8b; }
    .card.defect { background: #1ea7d9; }
    .card.colorless { background: #555555; }

    /* ▼ レア度文字色 ▼ */
    .rarity-rare { color: #ffd700 !important; font-weight: bold; }
    .rarity-uncommon { color: #1ec8ff !important; font-weight: bold; }
    .rarity-common { color: #cccccc !important; }

    /* ▼ 折りたたみ ▼ */
    .toggle-box {
      cursor: pointer;
      padding: 5px 0;
      user-select: none;
    }

    .toggle-arrow {
      font-weight: bold;
      margin-right: 6px;
    }

    .toggle-content {
      max-height: 0;
      overflow: hidden;
      margin-top: 4px;
      padding-left: 10px;
      color: #ffd24d;
      font-size: 14px;
      opacity: 0;
      transition: max-height 0.25s ease-out, opacity 0.25s ease-out;
    }

    .toggle-content.open {
      max-height: 200px;
      opacity: 1;
    }

    /* ▼ レア度枠線（最優先で適用） ▼ */
    .card.rare { border-color: #ffd700 !important; }
    .card.uncommon { border-color: #1ec8ff !important; }
    .card.common { border-color: #888888 !important; }
  </style>
</head>

<body>

<!-- ▼ 左上の更新日時 ▼ -->
<div id="lastUpdate"></div>

<h1>📘 カード図鑑</h1>

<!-- ▼ タブUI ▼ -->
<div class="tabs">
  <div class="tab active" data-filter="all">全カード</div>
  <div class="tab" data-filter="アイアンクラッド専用">アイアンクラッド</div>
  <div class="tab" data-filter="サイレント専用">サイレント</div>
  <div class="tab" data-filter="リージェント専用">リージェント</div>
  <div class="tab" data-filter="ネクロバインダー専用">ネクロバインダー</div>
  <div class="tab" data-filter="ディフェクト専用">ディフェクト</div>
  <div class="tab" data-filter="common">共通</div>
</div>

<input type="text" id="search" placeholder="カード名・タイプ・シナジーで検索">

<select id="sortSelect">
  <option value="name-asc">あいうえお順（昇順）</option>
  <option value="name-desc">あいうえお順（降順）</option>
  <option value="rarity-asc">レア度（昇順）</option>
  <option value="rarity-desc">レア度（降順）</option>
  <option value="cost-asc">コスト（昇順）</option>
  <option value="cost-desc">コスト（降順）</option>
  <option value="ucost-asc">強化後コスト（昇順）</option>
  <option value="ucost-desc">強化後コスト（降順）</option>
  <option value="rank-asc">ランク（昇順）</option>
  <option value="rank-desc">ランク（降順）</option>
</select>

<div id="cardList"></div>
  <script>
/* ▼ 最終更新日時 ▼ */
function showLastUpdate() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const h = String(now.getHours()).padStart(2, "0");
  const min = String(now.getMinutes()).padStart(2, "0");
  document.getElementById("lastUpdate").textContent =
    `最終更新：${y}/${m}/${d} ${h}:${min}`;
}
showLastUpdate();

/* ▼ カード読み込み ▼ */
async function loadCards() {
  const response = await fetch('cards.json?cache=' + Date.now());
  let cards = await response.json();

  const list = document.getElementById('cardList');
  const search = document.getElementById('search');
  const sortSelect = document.getElementById('sortSelect');
  const tabs = document.querySelectorAll('.tab');

  let currentFilter = "all";

  const rarityOrder = { "コモン": 1, "アンコモン": 2, "レア": 3 };
  const rankOrder = { "S": 1, "A": 2, "B": 3, "C": 4, "D": 5, "E": 6 };

  function sortCards(data) {
    const mode = sortSelect.value;

    return data.sort((a, b) => {
      switch (mode) {
        case "name-asc": return a.name.localeCompare(b.name, "ja");
        case "name-desc": return b.name.localeCompare(a.name, "ja");
        case "rarity-asc": return rarityOrder[a.rarity] - rarityOrder[b.rarity];
        case "rarity-desc": return rarityOrder[b.rarity] - rarityOrder[a.rarity];
        case "cost-asc": return a.cost - b.cost;
        case "cost-desc": return b.cost - a.cost;
        case "ucost-asc": return Number(a.upgradecost) - Number(b.upgradecost);
        case "ucost-desc": return Number(b.upgradecost) - Number(a.upgradecost);
        case "rank-asc": return rankOrder[a.valuation] - rankOrder[b.valuation];
        case "rank-desc": return rankOrder[b.valuation] - rankOrder[a.valuation];
        default: return 0;
      }
    });
  }

  function render() {
    list.innerHTML = "";

    let filtered = cards;

    /* ▼ タブフィルタ ▼ */
    if (currentFilter !== "all") {
      if (currentFilter === "common") {
        filtered = filtered.filter(c =>
          !c.tags.includes("アイアンクラッド専用") &&
          !c.tags.includes("サイレント専用") &&
          !c.tags.includes("リージェント専用") &&
          !c.tags.includes("ネクロバインダー専用") &&
          !c.tags.includes("ディフェクト専用")
        );
      } else {
        filtered = filtered.filter(c => c.tags.includes(currentFilter));
      }
    }

    /* ▼ 検索 ▼ */
    const keyword = search.value.toLowerCase();
    filtered = filtered.filter(c =>
      JSON.stringify(c).toLowerCase().includes(keyword)
    );

    /* ▼ ソート ▼ */
    filtered = sortCards(filtered);

    /* ▼ カード描画 ▼ */
    filtered.forEach(card => {
      const div = document.createElement('div');
      div.className = "card";

      if (card.tags.includes("アイアンクラッド専用")) div.classList.add("ironclad");
      else if (card.tags.includes("サイレント専用")) div.classList.add("silent");
      else if (card.tags.includes("リージェント専用")) div.classList.add("regent");
      else if (card.tags.includes("ネクロバインダー専用")) div.classList.add("necrobinder");
      else if (card.tags.includes("ディフェクト専用")) div.classList.add("defect");
      else div.classList.add("colorless");

      let rarityClass = "rarity-common";
      if (card.rarity === "レア") rarityClass = "rarity-rare";
      else if (card.rarity === "アンコモン") rarityClass = "rarity-uncommon";

      let typeIcon = "❓";
      if (card.type === "アタック") typeIcon = "⚔";
      else if (card.type === "スキル") typeIcon = "📘";
      else if (card.type === "パワー") typeIcon = "💪";

      div.innerHTML = `
        <strong><span class="type-icon">${typeIcon}</span>${card.name}</strong><br>
        タイプ：${card.type}<br>
        レア度：<span class="${rarityClass}">${card.rarity}</span><br>

        <div class="toggle-box">
          <span class="toggle-arrow">▼</span>コスト：${card.cost}
          <div class="toggle-content">強化後コスト：${card.upgradecost}</div>
        </div>

        <div class="toggle-box">
          <span class="toggle-arrow">▼</span>効果：${card.effect}
          <div class="toggle-content">強化後：${card.upgradeEffect}</div>
        </div>

        シナジー：${card.synergy.join(", ")}<br>
        ランク：${card.valuation}
      `;

      div.querySelectorAll(".toggle-box").forEach(box => {
        const arrow = box.querySelector(".toggle-arrow");
        const content = box.querySelector(".toggle-content");

        box.addEventListener("click", () => {
          const isOpen = content.classList.contains("open");
          content.classList.toggle("open");
          arrow.textContent = isOpen ? "▼" : "▲";
        });
      });

      list.appendChild(div);
    });
  }

  /* ▼ タブクリック処理 ▼ */
  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentFilter = tab.dataset.filter;
      render();
    });
  });

  search.addEventListener('input', render);
  sortSelect.addEventListener('change', render);

  render();
}

loadCards();
</script>

</body>
</html>
