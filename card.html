<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード図鑑</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    #search {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin-bottom: 20px;
    }

    /* ▼ カード基本デザイン ▼ */
    .card {
      background: #2f3542;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 3px solid transparent; /* ここは残すが、後で上書き可能にする */
      color: #ffffff;
    }
    .card strong {
      font-size: 18px;
    }

    /* ▼ キャラ専用背景色 ▼ */
    .card.ironclad { background: #8b1e1e; }
    .card.silent { background: #1e8b3a; }
    .card.regent { background: #d97a1e; }
    .card.necrobinder { background: #6a1e8b; }
    .card.defect { background: #1ea7d9; }
    .card.colorless { background: #555555; }

    /* ▼ レア度枠線（優先度を上げるため .card.rare の形にする） ▼ */
    .card.rare {
      border: 3px solid #ffd700 !important;
    }
    .card.uncommon {
      border: 3px solid #1ec8ff !important;
    }
    .card.common {
      border: 3px solid transparent !important;
    }

    /* ▼ レア度文字色（親の color を上書きするため強めに指定） ▼ */
    .rarity-rare {
      color: #ffd700 !important;
      font-weight: bold;
    }
    .rarity-uncommon {
      color: #1ec8ff !important;
      font-weight: bold;
    }
    .rarity-common {
      color: #cccccc !important;
    }
  </style>
</head>
<body>

<h1>📘 カード図鑑</h1>

<input type="text" id="search" placeholder="カード名・タイプ・シナジーで検索">

<div id="cardList"></div>

<script>
async function loadCards() {
  const response = await fetch('cards.json?cache=' + Date.now());
  const cards = await response.json();
  const list = document.getElementById('cardList');
  const search = document.getElementById('search');

  function render(filter = "") {
    list.innerHTML = "";
    cards
      .filter(c => JSON.stringify(c).toLowerCase().includes(filter.toLowerCase()))
      .forEach(card => {
        const div = document.createElement('div');
        div.className = "card";

        /* ▼ キャラ専用背景色 ▼ */
        if (card.tags.includes("アイアンクラッド専用")) div.classList.add("ironclad");
        else if (card.tags.includes("サイレント専用")) div.classList.add("silent");
        else if (card.tags.includes("リージェント専用")) div.classList.add("regent");
        else if (card.tags.includes("ネクロバインダー専用")) div.classList.add("necrobinder");
        else if (card.tags.includes("ディフェクト専用")) div.classList.add("defect");
        else div.classList.add("colorless");

        /* ▼ レア度枠線 ▼ */
        if (card.rarity === "レア") div.classList.add("rare");
        else if (card.rarity === "アンコモン") div.classList.add("uncommon");
        else div.classList.add("common");

        /* ▼ レア度文字色クラス ▼ */
        let rarityClass = "rarity-common";
        if (card.rarity === "レア") rarityClass = "rarity-rare";
        else if (card.rarity === "アンコモン") rarityClass = "rarity-uncommon";

        div.innerHTML = `
          <strong>${card.name}</strong><br>
          タイプ：${card.type}<br>
          コスト：${card.cost}<br>
          レア度：<span class="${rarityClass}">${card.rarity}</span><br>
          効果：${card.effect}<br>
          強化後：${card.upgradeEffect}<br>
          シナジー：${card.synergy.join(", ")}<br>
          ランク：${card.valuation}
        `;
        list.appendChild(div);
      });
  }

  search.addEventListener('input', () => render(search.value));
  render();
}

loadCards();
</script>

</body>
</html>
