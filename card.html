<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カード図鑑</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    #search {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin-bottom: 20px;
    }
    .card {
      background: #2f3542;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .card strong {
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>📘 カード図鑑</h1>

<input type="text" id="search" placeholder="カード名・タイプ・シナジーで検索">

<div id="cardList"></div>

<script>
async function loadCards() {
  const response = await fetch('cards.json');
  const cards = await response.json();
  const list = document.getElementById('cardList');
  const search = document.getElementById('search');

  function render(filter = "") {
    list.innerHTML = "";
    cards
      .filter(c => JSON.stringify(c).toLowerCase().includes(filter.toLowerCase()))
      .forEach(card => {
        const div = document.createElement('div');
        div.className = "card";
        div.innerHTML = `
          <strong>${card.name}</strong><br>
          タイプ：${card.type}<br>
          コスト：${card.cost}<br>
          シナジー：${card.synergy.join(", ")}<br>
          ランク：${card.評価}
        `;
        list.appendChild(div);
      });
  }

  search.addEventListener('input', () => render(search.value));
  render();
}

loadCards();
</script>

</body>
</html>
